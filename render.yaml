services:
  - type: web
    name: smartpdf-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: smartpdf-ai
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartpdf-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: smartpdf-redis
          type: redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: smartpdf-documents
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: localhost:9092

  - type: redis
    name: smartpdf-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: smartpdf-db
    databaseName: smartpdf
    plan: free
